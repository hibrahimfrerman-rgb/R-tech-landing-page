[build]
  publish = "."

[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/icons/favicon.*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/assets/icons/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/assets/icons/*.ico"
  [headers.values]
    Cache-Control = "no-cache"
